name: OpenWA
version: "0.2.0"
slug: openwa
description: Self-hosted OpenWA WhatsApp API gateway with Home Assistant helper endpoints
url: https://github.com/nomi25home/homeassistant-openwa-addon
arch:
  - amd64

startup: application
boot: auto
init: false
ingress: false

ports:
  2785/tcp: 2785
  2786/tcp: 2786

ports_description:
  2785/tcp: OpenWA native API
  2786/tcp: OpenWA helper API and status UI

webui: "http://[HOST]:[PORT:2786]/"

map:
  - type: addon_config
    read_only: false

options:
  api_master_key: "CHANGE_ME_TO_A_LONG_RANDOM_SECRET"
  openwa_api_key: ""
  session_id: ""
  log_level: "info"
  recipients:
    - name: "primary"
      chat_id: "15551234567@c.us"
    - name: "secondary"
      chat_id: "15557654321@c.us"

schema:
  api_master_key: str
  openwa_api_key: str
  session_id: str
  log_level: list(debug|info|warn|error)
  recipients:
    - name: str
      chat_id: str